  start_date: 2021-03
  end_date: 2021-06
  tasks:
  - en: Developed an automated NGS analysis pipeline for tumor samples on the Picasso supercomputer.
    es: Desarrollé un pipeline automatizado de análisis NGS para muestras tumorales en el supercomputador Picasso.
  - en: Programmed Bash and R scripts with GNU Parallel for large-scale sample processing.
    es: Programé scripts en Bash y R con GNU Parallel para procesamiento de muestras a gran escala.
  - en: Integrated FastQC, MultiQC, Qualimap, and vcftoolz compare for quality control and visualization.
    es: Integré FastQC, MultiQC, Qualimap y vcftoolz compare para control de calidad y visualización.
  - en: Evaluated multiple aligners and variant callers to reduce false positives.
    es: Evalué distintos alineadores y detectores de variantes para reducir falsos positivos.
  - en: Annotated variants using ANNOVAR, OpenCRAVAT, MyVariant, and biomedical databases.
    es: Anoté variantes usando ANNOVAR, OpenCRAVAT, MyVariant y bases de datos biomédicas.
  - en: Detected copy number alterations and gene fusions with unified R reporting.
    es: Detecté alteraciones en el número de copias y fusiones génicas mediante informes unificados en R.
