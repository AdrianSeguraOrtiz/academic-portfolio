  tasks:
  - en: Developed a workflow orchestration tool in Go with SQLite storage, JSON/YAML component definitions, and Kubernetes and Nomad execution support.
    es: Desarrollé una herramienta de orquestación de flujos de trabajo en Go con almacenamiento SQLite, definiciones de componentes en JSON/YAML y soporte de ejecución en Kubernetes y Nomad.
  - en: Administered computational resources using Proxmox and vSphere for deployment, maintenance, and monitoring of virtual machines.
    es: Administré recursos computacionales con Proxmox y vSphere para despliegue, mantenimiento y monitorización de máquinas virtuales.
  - en: Processed multisource satellite imagery from Sentinel-2, PlanetScope, and Landsat, including download automation, temporal composites, spectral indices, and band manipulation.
    es: Procesé imágenes satelitales multifuente de Sentinel-2, PlanetScope y Landsat, incluyendo automatización de descargas, compuestos temporales, índices espectrales y manipulación de bandas.
  - en: Developed Gradio interfaces for remote sensing model execution and result visualization.
    es: Desarrollé interfaces Gradio para ejecución de modelos de teledetección y visualización de resultados.
  - en: Maintained OpenProject installations, upgrades, deployments, and project-management workflows.
    es: Mantuve instalaciones, actualizaciones, despliegues y flujos de gestión de proyectos en OpenProject.
