  tasks:
  - en: Developed Progressive Web Applications with Next.js and MongoDB for crop sample data recording and analysis.
    es: Desarrollé aplicaciones web progresivas con Next.js y MongoDB para registro y análisis de muestras agrícolas.
  - en: Encapsulated Python, Java, and R scripts into Docker containers for EnBiC2-Lab components.
    es: Encapsulé scripts en Python, Java y R en contenedores Docker para componentes de EnBiC2-Lab.
  - en: Developed an evolutionary algorithm with JMetal and EPANET simulations to predict irrigation connector properties.
    es: Desarrollé un algoritmo evolutivo con JMetal y simulaciones EPANET para predecir propiedades de conectores de riego.
  - en: Contributed to Angular interfaces for scientific workflow execution.
    es: Contribuí a interfaces Angular para ejecución de flujos de trabajo científicos.
  - en: Managed project tasks and coordination through OpenProject.
    es: Gestioné tareas y coordinación de proyectos mediante OpenProject.
