- id: software_01
  name: DNATranslatorAnalyzer
  full_name: null
  type:
    en: Software project
    es: Proyecto software
  description:
    en: >-
      DNA sequence analyzer for reverse and reverse-complement construction, nucleotide frequency
      calculation, six-frame translation, and stop-codon fragment detection.
    es: >-
      Analizador de secuencias de ADN para construcción inversa y reverso-complementaria,
      cálculo de frecuencias nucleotídicas, traducción en seis marcos y detección
