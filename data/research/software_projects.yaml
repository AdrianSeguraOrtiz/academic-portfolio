    es: Proyecto de software científico
  description:
    en: >-
      Software project implementing an evolutionary algorithm to determine an optimal ensemble
      of machine learning techniques for gene regulatory network inference.
    es: >-
      Proyecto software que implementa un algoritmo evolutivo para determinar un conjunto
